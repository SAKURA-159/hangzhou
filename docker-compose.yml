version: "3.9"

services:
  backend:
    build: ./backend
    container_name: hangzhou-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/hangzhou.db
      - JWT_SECRET=change-me-in-production-use-a-long-random-string
      - LOG_LEVEL=INFO
    networks:
      - hangzhou-net

  frontend:
    build: ./frontend
    container_name: hangzhou-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - hangzhou-net

networks:
  hangzhou-net:
    driver: bridge
