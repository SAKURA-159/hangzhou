<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="gt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#489090;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#234545;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="gw" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D89048;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="gv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#489090;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#C8E0E0;stop-opacity:0.02"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1440" height="900" fill="#F0F0F0"/>

  <!-- Top gradient bar -->
  <rect x="0" y="0" width="1440" height="180" fill="url(#gt)"/>

  <!-- Diagonal structural polygons -->
  <polygon points="0,180 600,0 1440,0 1440,40 600,40 0,220" fill="url(#gt)" opacity="0.6"/>
  <polygon points="0,320 400,120 1440,120 1440,160 400,160 0,360" fill="url(#gt)" opacity="0.4"/>
  <polygon points="0,460 300,260 1440,260 1440,300 300,300 0,500" fill="url(#gt)" opacity="0.25"/>
  <polygon points="0,600 200,460 1440,460 1440,500 200,500 0,640" fill="url(#gt)" opacity="0.15"/>

  <!-- Warm accent zone -->
  <polygon points="1440,900 600,900 1440,300" fill="url(#gw)" opacity="0.5"/>
  <polygon points="1440,650 1000,900 1200,900 1440,750" fill="url(#gw)" opacity="0.3"/>

  <!-- Horizontal rule lines -->
  <line x1="0" y1="150" x2="1440" y2="150" stroke="#489090" stroke-width="0.8" opacity="0.12"/>
  <line x1="0" y1="280" x2="1440" y2="280" stroke="#489090" stroke-width="0.8" opacity="0.08"/>
  <line x1="0" y1="410" x2="1440" y2="410" stroke="#489090" stroke-width="0.8" opacity="0.06"/>
  <line x1="0" y1="540" x2="1440" y2="540" stroke="#489090" stroke-width="0.6" opacity="0.05"/>
  <line x1="0" y1="670" x2="1440" y2="670" stroke="#489090" stroke-width="0.6" opacity="0.04"/>
  <line x1="0" y1="800" x2="1440" y2="800" stroke="#489090" stroke-width="0.5" opacity="0.03"/>

  <!-- Vertical accent lines -->
  <line x1="360" y1="0" x2="360" y2="900" stroke="#489090" stroke-width="0.6" opacity="0.05"/>
  <line x1="720" y1="0" x2="720" y2="900" stroke="#489090" stroke-width="0.6" opacity="0.04"/>
  <line x1="1080" y1="0" x2="1080" y2="900" stroke="#489090" stroke-width="0.5" opacity="0.03"/>

  <!-- Rectangular accent blocks -->
  <rect x="60" y="40" width="240" height="4" rx="2" fill="#489090" opacity="0.18"/>
  <rect x="320" y="40" width="100" height="4" rx="2" fill="#D89048" opacity="0.14"/>
  <rect x="60" y="56" width="140" height="2" rx="1" fill="#489090" opacity="0.1"/>

  <rect x="1100" y="60" width="200" height="4" rx="2" fill="#489090" opacity="0.12"/>
  <rect x="1320" y="60" width="60" height="4" rx="2" fill="#D89048" opacity="0.1"/>

  <!-- Bottom accent bars -->
  <rect x="40" y="850" width="300" height="4" rx="2" fill="#489090" opacity="0.08"/>
  <rect x="600" y="870" width="400" height="3" rx="1.5" fill="#D89048" opacity="0.06"/>

  <!-- Subtle dot grid in the center-right area -->
  <pattern id="dots" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
    <circle cx="40" cy="40" r="1.5" fill="#489090" opacity="0.08"/>
  </pattern>
  <rect x="600" y="300" width="800" height="550" fill="url(#dots)"/>

  <!-- Small corner decoration -->
  <path d="M40,40 L40,100 M40,40 L100,40" stroke="#489090" stroke-width="1.5" opacity="0.15" fill="none"/>
  <path d="M1400,860 L1400,800 M1400,860 L1340,860" stroke="#D89048" stroke-width="1.5" opacity="0.12" fill="none"/>
</svg>
